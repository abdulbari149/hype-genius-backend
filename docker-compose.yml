services:
  redis:
    image: redis/redis-stack:7.0.2-RC1
    container_name: hype_genius_redis
    ports:
      - '6380:6379'
      - '8088:8001'
  postgres:
    image: postgres:16
    container_name: hype_genius_postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hype_genius
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local